<svg class="hero__art-svg" viewBox="0 0 480 380" role="img" aria-label="Example: a Social Security payment slip and a Medicare plan card shown side by side, with a clock" preserveAspectRatio="xMidYMid meet">
  <!-- Social Security payment slip -->
  <g>
    <rect x="34" y="70" width="230" height="250" rx="16" fill="var(--bc-ill-line)" opacity=".18"/>
    <rect x="28" y="62" width="230" height="250" rx="16" fill="var(--bc-ill-paper)" stroke="var(--bc-ill-line)" stroke-width="2"/>
    <path d="M28 78a16 16 0 0 1 16-16h198a16 16 0 0 1 16 16v34H28z" fill="var(--bc-teal-700)"/>
    <rect x="46" y="80" width="120" height="9" rx="4.5" fill="var(--bc-ill-paper)" opacity=".92"/>
    <rect x="46" y="96" width="78" height="7" rx="3.5" fill="var(--bc-ill-gold)"/>
    <!-- placeholder lines -->
    <rect x="46" y="132" width="150" height="8" rx="4" fill="var(--bc-ill-fill-2)"/>
    <rect x="46" y="150" width="188" height="8" rx="4" fill="var(--bc-ill-fill-2)"/>
    <rect x="46" y="168" width="120" height="8" rx="4" fill="var(--bc-ill-fill-2)"/>
    <!-- emphasized amount + gold underline -->
    <rect x="46" y="206" width="96" height="14" rx="5" fill="var(--bc-ill-line)"/>
    <rect x="46" y="226" width="140" height="5" rx="2.5" fill="var(--bc-ill-gold)"/>
    <rect x="46" y="252" width="164" height="8" rx="4" fill="var(--bc-ill-fill-2)"/>
    <rect x="46" y="270" width="104" height="8" rx="4" fill="var(--bc-ill-fill-2)"/>
    <!-- gold pill -->
    <g>
      <rect x="150" y="286" width="132" height="30" rx="15" fill="var(--bc-ill-gold)"/>
      <text x="216" y="306" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="var(--bc-teal-900)">+2.7% · +$61/mo</text>
    </g>
  </g>

  <!-- Medicare plan card (generic, overlapping) -->
  <g>
    <rect x="218" y="132" width="238" height="158" rx="18" fill="var(--bc-ill-line)" opacity=".18"/>
    <rect x="212" y="124" width="238" height="158" rx="18" fill="var(--bc-ill-paper)" stroke="var(--bc-ill-line)" stroke-width="2"/>
    <path d="M212 142a18 18 0 0 1 18-18h202a18 18 0 0 1 18 18v20H212z" fill="var(--bc-teal-600)"/>
    <!-- star medallion -->
    <circle cx="256" cy="200" r="30" fill="var(--bc-teal-050)" stroke="var(--bc-ill-line)" stroke-width="2"/>
    <path d="M256 182l6.2 12.6 13.9 2-10 9.8 2.4 13.8-12.5-6.5-12.5 6.5 2.4-13.8-10-9.8 13.9-2z" fill="var(--bc-ill-gold)"/>
    <!-- placeholder lines -->
    <rect x="302" y="178" width="126" height="9" rx="4.5" fill="var(--bc-ill-fill-2)"/>
    <rect x="302" y="196" width="100" height="9" rx="4.5" fill="var(--bc-ill-fill-2)"/>
    <rect x="302" y="220" width="140" height="9" rx="4.5" fill="var(--bc-ill-fill-2)"/>
    <!-- Plan chip -->
    <rect x="302" y="242" width="66" height="24" rx="12" fill="var(--bc-ill-accent)"/>
    <text x="335" y="259" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="var(--bc-teal-900)">Plan</text>
  </g>

  <!-- Clock motif, tucked top-right -->
  <g>
    <circle cx="416" cy="70" r="34" fill="var(--bc-ill-paper)" stroke="var(--bc-ill-line)" stroke-width="2"/>
    <circle cx="416" cy="70" r="26" fill="none" stroke="var(--bc-ill-fill-2)" stroke-width="2"/>
    <line x1="416" y1="70" x2="416" y2="52" stroke="var(--bc-ill-gold)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="416" y1="70" x2="431" y2="76" stroke="var(--bc-ill-line)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="416" cy="70" r="3.5" fill="var(--bc-ill-gold)"/>
  </g>

  <!-- Example badge, bottom-left corner -->
  <g>
    <rect x="18" y="336" width="94" height="28" rx="14" fill="var(--bc-teal-800)" stroke="var(--bc-ill-gold)" stroke-width="1.5"/>
    <text x="65" y="354" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" letter-spacing=".5" fill="var(--bc-ill-gold)">EXAMPLE</text>
  </g>
</svg>
